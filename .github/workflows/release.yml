name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/publish (e.g. v0.1.2). Empty = current ref."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          # macos-13 Intel runners are often unavailable / queued forever.
          # Cross-compile x86_64 from Apple Silicon macos-14 instead.
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            # cross-compile from x64 host
            use_cross: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build -p grok-companion --release --target ${{ matrix.target }}
          else
            cargo build -p grok-companion --release --target ${{ matrix.target }}
          fi
          BIN="target/${{ matrix.target }}/release/grok-companion"
          test -f "$BIN"
          chmod +x "$BIN"
          STAGE="dist/${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "$BIN" "$STAGE/grok-companion"
          # portable archive
          tar -C "$STAGE" -czf "grok-companion-${{ matrix.target }}.tar.gz" grok-companion
          # raw binary alias (install script accepts both)
          cp "$BIN" "grok-companion-${{ matrix.target }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grok-companion-${{ matrix.target }}
          path: |
            grok-companion-${{ matrix.target }}.tar.gz
            grok-companion-${{ matrix.target }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List assets
        run: find artifacts -type f | sort

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/grok-companion-*.tar.gz
            artifacts/grok-companion-aarch64-apple-darwin
            artifacts/grok-companion-x86_64-apple-darwin
            artifacts/grok-companion-x86_64-unknown-linux-gnu
            artifacts/grok-companion-aarch64-unknown-linux-gnu
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
